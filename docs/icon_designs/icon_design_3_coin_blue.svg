<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 - 深蓝色 -->
  <circle cx="256" cy="256" r="256" fill="#1565C0"/>
  
  <!-- 钱币图标 -->
  <g fill="white">
    <!-- 外圆 -->
    <circle cx="256" cy="256" r="120" stroke="white" stroke-width="12" fill="none"/>
    
    <!-- 内圆 -->
    <circle cx="256" cy="256" r="90" stroke="white" stroke-width="8" fill="none" opacity="0.6"/>
    
    <!-- ¥ 符号 -->
    <text x="256" y="280" 
          font-family="Arial, sans-serif" 
          font-size="100" 
          font-weight="bold" 
          fill="white" 
          text-anchor="middle"/>
  </g>
  
  <!-- 装饰光环 -->
  <circle cx="256" cy="256" r="180" stroke="white" stroke-width="2" fill="none" opacity="0.3" stroke-dasharray="20,20"/>
</svg>
