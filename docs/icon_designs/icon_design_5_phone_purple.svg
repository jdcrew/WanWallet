<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 - 紫色渐变 -->
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9C27B0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#673AB7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3F51B5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <circle cx="256" cy="256" r="256" fill="url(#grad2)"/>
  
  <!-- 手机轮廓 -->
  <rect x="156" y="100" width="200" height="320" rx="30" ry="30" 
        fill="none" stroke="white" stroke-width="8"/>
  
  <!-- 屏幕内容 -->
  <rect x="176" y="140" width="160" height="200" rx="10" fill="white" opacity="0.9"/>
  
  <!-- 屏幕内的记账图标 -->
  <circle cx="256" cy="220" r="30" fill="#4CAF50"/>
  <text x="256" y="235" font-size="30" text-anchor="middle" fill="white">¥</text>
  
  <!-- 底部按钮 -->
  <rect x="236" y="380" width="40" height="40" rx="20" fill="white"/>
</svg>
