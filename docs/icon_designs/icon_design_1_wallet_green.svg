<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 - 绿色圆形 -->
  <circle cx="256" cy="256" r="256" fill="#4CAF50"/>
  
  <!-- 钱包图标 - 白色 -->
  <g fill="white">
    <!-- 钱包主体 -->
    <rect x="120" y="180" width="272" height="180" rx="20" ry="20"/>
    
    <!-- 钱包翻盖 -->
    <rect x="340" y="180" width="80" height="60" rx="10" ry="10"/>
    
    <!-- 钱包扣 -->
    <circle cx="380" cy="240" r="15"/>
    
    <!-- W 字母 -->
    <path d="M 180 250 L 200 300 L 230 220 L 260 300 L 280 250" 
          stroke="white" stroke-width="25" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- 光泽效果 -->
  <ellipse cx="200" cy="200" rx="80" ry="40" fill="white" opacity="0.2"/>
</svg>
